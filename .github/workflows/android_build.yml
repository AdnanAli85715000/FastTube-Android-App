name: Android Build with Buildozer

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Increased timeout

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libssl-dev \
          build-essential wget curl unzip ccache \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install buildozer==1.5.0 cython==0.29.33
        pip install ffmpeg-python yt-dlp

    - name: Setup Android SDK (Fixed)
      run: |
        # Create necessary directories
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Set SDK root
        export ANDROID_SDK_ROOT="$HOME/android-sdk"
        mkdir -p "$ANDROID_SDK_ROOT"
        
        # Download and extract command line tools
        cd "$ANDROID_SDK_ROOT"
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
        rm cmdline-tools.zip
        
        # Correct folder structure (critical fix)
        mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
        
        # Add to PATH
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH
        
        # Verify sdkmanager is accessible
        echo "Checking sdkmanager..."
        which sdkmanager || ls -la "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
        
        # Accept licenses and install components
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-33" "build-tools;34.0.0" "emulator"

    - name: Setup Android NDK
      run: |
        export ANDROID_NDK_HOME="$HOME/android-ndk-r25b"
        wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip android-ndk-r25b-linux.zip -d "$HOME"
        rm android-ndk-r25b-linux.zip
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

    - name: Build APK
      run: |
        # Clean previous builds
        rm -rf .buildozer
        
        # Build with verbose output
        buildozer -v android debug 2>&1 | tee build.log
        
        # Check if APK was created
        if ls bin/*.apk 1> /dev/null 2>&1; then
          echo "APK built successfully!"
        else
          echo "::error::APK file not found!"
          cat build.log
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: FastTube-APK
        path: bin/*.apk
        if-no-files-found: error

    - name: Upload build log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
